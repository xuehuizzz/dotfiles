[keyboard]
bindings = [
    { key = "V", mods = "Command", action = "Paste" },
    { key = "C", mods = "Command", action = "Copy" },
    { key = "N", mods = "Command", action = "SpawnNewInstance" },
    { key = "Left",  mods = "Command", chars = "\u001bOH"  },
    { key = "Right", mods = "Command", chars = "\u001bOF"  },
    { key = "Up",    mods = "Command", chars = "\u001bb"   },
    { key = "Down",  mods = "Command", chars = "\u001bf"   },
    { key = "Left",  mods = "Alt", chars = "\u001bb"       },
    { key = "Right", mods = "Alt", chars = "\u001bf"       },
    { key = "Back",  mods = "Command", chars = "\u0015"    },
    { key = "Back",  mods = "Alt", chars = "\u001b\u007f"  },
    { key = "Key0",  mods = "Command", action = "ResetFontSize" },
    { key = "Equals", mods = "Command", action = "IncreaseFontSize" },
    { key = "Minus",  mods = "Command", action = "DecreaseFontSize" },
    { key = "F",  mods = "Command", action = "SearchForward" },
    { key = "K",  mods = "Command", action = "ClearHistory" },
    { key = "Q",  mods = "Command", action = "Quit" },
    { key = "W",  mods = "Command", action = "Quit" },
]

[env]
TERM = "xterm-256color"
LANG = "en_US.UTF-8"
LC_ALL = "en_US.UTF-8"

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#1d1f21"
foreground = "#c5c8c6"

[colors.normal]
black = "#1d1f21"
red = "#cc6666"
green = "#b5bd68"
yellow = "#f0c674"
blue = "#81a2be"
magenta = "#b294bb"
cyan = "#8abeb7"
white = "#c5c8c6"

[colors.bright]
black = "#666666"
red = "#d54e53"
green = "#b9ca4a"
yellow = "#e7c547"
blue = "#7aa6da"
magenta = "#c397d8"
cyan = "#70c0b1"
white = "#eaeaea"

[colors.search.matches]
foreground = "#1d1f21"
background = "#f0c674"

[colors.search.focused_match]
foreground = "#1d1f21"
background = "#b5bd68"

[colors.selection]
text = "#1d1f21"
background = "#81a2be"

[colors.cursor]
text = "#1d1f21"
cursor = "#c5c8c6"

[colors.vi_mode_cursor]
text = "#1d1f21"
cursor = "#f0c674"

[cursor]
style = { shape = "Beam", blinking = "Always" }
blink_interval = 500
blink_timeout = 0
unfocused_hollow = false

[selection]
save_to_clipboard = true

[font]
size = 12.0
normal = { family = "Maple Mono NF CN", style = "Regular" }
bold = { family = "Maple Mono NF CN", style = "Bold" }
italic = { family = "Maple Mono NF CN", style = "Italic" }
builtin_box_drawing = true

[font.offset]
x = 0
y = 2

[window]
dimensions = { columns = 120, lines = 50 }
padding = { x = 8, y = 8 }
dynamic_padding = true
opacity = 0.9                              # 从 0.85 提高到 0.9，减少合成开销
blur = false                               # 关闭毛玻璃，这是最大的性能杀手
title = "terminal"
option_as_alt = "Both"
# decorations = "Buttonless"
startup_mode = "Windowed"

[scrolling]
history = 10000
multiplier = 5                             # 提高滚动倍率，滚动更快更跟手

[mouse]
hide_when_typing = true                    # 打字时自动隐藏鼠标，减少视觉干扰

[general]
live_config_reload = true

[terminal]
osc52 = "CopyPaste"
