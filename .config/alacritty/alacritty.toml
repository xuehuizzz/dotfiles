[keyboard]
bindings = [
    { key = "V", mods = "Command", action = "Paste" },
    { key = "C", mods = "Command", action = "Copy" },
    { key = "N", mods = "Command", action = "SpawnNewInstance" },
    { key = "Left",  mods = "Command", chars = "\u001bOH"  },# jump to line start (Home)
    { key = "Right", mods = "Command", chars = "\u001bOF"  },# jump to line end (End)
    { key = "Up",    mods = "Command", chars = "\u001bb"   },# skip word left
    { key = "Down",  mods = "Command", chars = "\u001bf"   },# skip word right
]

[env]
TERM = "xterm-256color"
LANG = "en_US.UTF-8"
LC_ALL = "en_US.UTF-8"

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#1d1f21"
foreground = "#c5c8c6"

[colors.normal]
black = "#1d1f21"
red = "#cc6666"
green = "#b5bd68"
yellow = "#f0c674"
blue = "#81a2be"
magenta = "#b294bb"
cyan = "#8abeb7"
white = "#c5c8c6"

[colors.bright]
black = "#666666"
red = "#d54e53"
green = "#b9ca4a"
yellow = "#e7c547"
blue = "#7aa6da"
magenta = "#c397d8"
cyan = "#70c0b1"
white = "#eaeaea"

[cursor]
style = { shape = "Beam", blinking = "Always" }
unfocused_hollow = false

[selection]
save_to_clipboard = true

[font]
size = 12.0
normal = { family = "Maple Mono NF CN", style = "Regular" }
bold = { family = "Maple Mono NF CN", style = "Bold" }
italic = { family = "Maple Mono NF CN", style = "Italic" }

[window]
dimensions = { columns = 120, lines = 50 }
padding = { x = 8, y = 8 }
dynamic_padding = true
opacity = 0.85
title = "terminal"

[general]
live_config_reload = true

[terminal]
osc52 = "CopyPaste"
